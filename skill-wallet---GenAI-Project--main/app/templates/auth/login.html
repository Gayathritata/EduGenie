<!-- File: app/templates/auth/login.html -->
<!-- Glassmorphic Login Screen -->
{% extends "base.html" %}

{% block title %}Login – EduGenie{% endblock %}

{% block content %}
<div class="hero">
    <div class="hero-glow-1"></div>
    <div class="hero-glow-2"></div>

    <div class="glass-panel animated" style="width: 100%; max-width: 440px; padding: 40px; border-radius: var(--radius-lg); text-align: left;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="brand" style="justify-content: center; font-size: 1.8rem; margin-bottom: 8px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#cyan-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                Edu<span class="brand-accent">Genie</span>
            </div>
            <p style="color: #64748b; font-size: 0.9rem;">Sign in to your learning dashboard</p>
        </div>

        <!-- Error feedback box -->
        <div id="auth-error" class="glass-panel" style="display: none; padding: 12px 16px; margin-bottom: 20px; border-color: var(--accent-error); color: var(--accent-error); font-size: 0.85rem; background: rgba(255, 23, 68, 0.03);"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" class="form-input" placeholder="e.g. alex_student" required autocomplete="username">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.9rem;">
            New to EduGenie? <a href="/register" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Create account</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/api_client.js"></script>
<script src="/static/js/auth.js"></script>
<script>
    // Extract registered triggers or logout messages from query string
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg');
        const errorBox = document.getElementById('auth-error');
        
        if (msg === 'registered') {
            errorBox.textContent = 'Account created successfully! Please sign in.';
            errorBox.style.borderColor = 'var(--accent-success)';
            errorBox.style.color = 'var(--accent-success)';
            errorBox.style.background = 'rgba(0, 230, 118, 0.03)';
            errorBox.style.display = 'block';
        } else if (msg === 'logged_out') {
            errorBox.textContent = 'You have logged out successfully.';
            errorBox.style.borderColor = 'var(--accent-secondary)';
            errorBox.style.color = 'var(--accent-secondary)';
            errorBox.style.background = 'rgba(79, 172, 254, 0.03)';
            errorBox.style.display = 'block';
        } else if (msg === 'unauthorized') {
            errorBox.textContent = 'Session expired or unauthorized. Please login.';
            errorBox.style.display = 'block';
        }
    });
</script>
{% endblock %}
