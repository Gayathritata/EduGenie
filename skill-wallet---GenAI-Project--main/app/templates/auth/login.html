<!-- File: app/templates/auth/login.html -->
<!-- Glassmorphic Login Screen -->
{% extends "base.html" %}

{% block title %}Sign In – EduGenie{% endblock %}

{% block content %}
<div class="auth-page-wrapper">
    <!-- Glowing background blur decorations -->
    <div class="auth-glow-blob blob-purple" aria-hidden="true"></div>
    <div class="auth-glow-blob blob-cyan" aria-hidden="true"></div>

    <div class="glass-panel auth-card animated">
        <header class="auth-header">
            <div class="brand">
                <svg class="logo-svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="url(#cyan-grad)" stroke-width="2.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>Edu<span class="brand-accent">Genie</span></span>
            </div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to resume your learning path</p>
        </header>

        <!-- Feedback Messages -->
        <div id="auth-error" class="glass-panel feedback-box" style="display: none;"></div>

        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-primary auth-submit-btn">Sign In</button>
        </form>

        <footer class="auth-card-footer">
            <p>New to EduGenie? <a href="/register">Create an account</a></p>
        </footer>
    </div>
</div>

<style>
/* Scoped Auth Page Styles */
.auth-page-wrapper {
    position: relative;
    width: 100vw;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-color: var(--bg-base);
    overflow: hidden;
}

.auth-glow-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.45;
    pointer-events: none;
}

.blob-purple {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(127, 0, 255, 0.15) 0%, transparent 70%);
    top: 10%;
    left: 20%;
}

.blob-cyan {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, transparent 70%);
    bottom: 10%;
    right: 20%;
}

.auth-card {
    width: 100%;
    max-width: 450px;
    padding: 48px 40px;
    background: rgba(16, 22, 38, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.auth-header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.auth-header .brand {
    font-size: 1.8rem;
    margin-bottom: 16px;
}

.auth-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
}

.auth-subtitle {
    font-size: 0.9rem;
    color: #64748b;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.auth-submit-btn {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    margin-top: 10px;
}

.feedback-box {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    line-height: 1.4;
    transition: all var(--transition-normal);
}

.auth-card-footer {
    text-align: center;
    font-size: 0.9rem;
    color: #94a3b8;
}

.auth-card-footer a {
    color: var(--accent-primary);
    text-decoration: none;
    font-weight: 600;
    transition: color var(--transition-fast);
}

.auth-card-footer a:hover {
    color: var(--accent-secondary);
}

.logo-svg {
    transition: transform var(--transition-slow);
}

.brand:hover .logo-svg {
    transform: rotate(360deg);
}

@media (max-width: 480px) {
    .auth-card {
        padding: 32px 24px;
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script src="/static/js/api_client.js"></script>
<script src="/static/js/auth.js"></script>
<script>
    // Handle redirect alerts
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg');
        const errorBox = document.getElementById('auth-error');
        
        if (msg) {
            errorBox.style.display = 'block';
            if (msg === 'registered') {
                errorBox.textContent = 'Account successfully created! Please sign in below.';
                errorBox.style.borderColor = 'var(--accent-success)';
                errorBox.style.color = 'var(--accent-success)';
                errorBox.style.background = 'rgba(0, 230, 118, 0.03)';
            } else if (msg === 'logged_out') {
                errorBox.textContent = 'You have been successfully signed out.';
                errorBox.style.borderColor = 'var(--accent-secondary)';
                errorBox.style.color = 'var(--accent-secondary)';
                errorBox.style.background = 'rgba(79, 172, 254, 0.03)';
            } else {
                errorBox.textContent = msg;
                errorBox.style.borderColor = 'var(--accent-error)';
                errorBox.style.color = 'var(--accent-error)';
                errorBox.style.background = 'rgba(255, 23, 68, 0.03)';
            }
        }
    });
</script>
{% endblock %}
