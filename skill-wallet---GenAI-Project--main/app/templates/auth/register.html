<!-- File: app/templates/auth/register.html -->
<!-- Glassmorphic Register Screen -->
{% extends "base.html" %}

{% block title %}Register – EduGenie{% endblock %}

{% block content %}
<div class="hero">
    <div class="hero-glow-1"></div>
    <div class="hero-glow-2"></div>

    <div class="glass-panel animated" style="width: 100%; max-width: 460px; padding: 40px; border-radius: var(--radius-lg); text-align: left;">
        <div style="text-align: center; margin-bottom: 24px;">
            <div class="brand" style="justify-content: center; font-size: 1.8rem; margin-bottom: 8px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#cyan-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                Edu<span class="brand-accent">Genie</span>
            </div>
            <p style="color: #64748b; font-size: 0.9rem;">Create your learning co-pilot account</p>
        </div>

        <!-- Error feedback box -->
        <div id="auth-error" class="glass-panel" style="display: none; padding: 12px 16px; margin-bottom: 20px; border-color: var(--accent-error); color: var(--accent-error); font-size: 0.85rem; background: rgba(255, 23, 68, 0.03);"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="e.g. alex_student" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="e.g. alex@university.edu" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter password" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.9rem;">
            Already have an account? <a href="/login" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/api_client.js"></script>
<script src="/static/js/auth.js"></script>
{% endblock %}
